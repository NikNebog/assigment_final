config:
  target: "http://localhost:3000"
  phases:
    - duration: 30
      arrivalRate: 5
      name: "Warm-up phase"
    - duration: 60
      arrivalRate: 10
      name: "Normal load phase"
    - duration: 30
      arrivalRate: 20
      name: "High load phase"

scenarios:
  - name: "Assignment API load test"
    flow:
      - get:
          url: "/api/assignments"
      - post:
          url: "/api/assignments"
          json:
            title: "Load Test Assignment"
            course: "Software Testing"
            description: "Created during Artillery load test."
            deadline: "2026-06-01"
            status: "Published"
